<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>의약품 데이터 분석기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--s1:#1a1d27;--s2:#22263a;--bd:#2e3250;--ac:#6c8aff;--ac2:#a78bfa;--tx:#e2e8f0;--tx2:#94a3b8;--gr:#34d399}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:12px 22px;display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:var(--ac);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.wrap{max-width:1500px;margin:0 auto;padding:16px}

/* Upload */
.upzone{border:2px dashed var(--bd);border-radius:14px;padding:44px;text-align:center;cursor:pointer;background:var(--s1);transition:.2s}
.upzone:hover,.upzone.drag{border-color:var(--ac);background:rgba(108,138,255,.07)}
.upbtn{margin-top:14px;background:var(--ac);color:#fff;border:none;padding:9px 22px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
#fi{display:none}

/* Config bar */
.cfgbar{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 16px;margin:12px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cfgbar label{font-size:11px;color:var(--tx2)}
.cfgbar select,.cfgbar input[type=number]{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 9px;border-radius:7px;font-size:12px;outline:none}
.cfgbtn{background:var(--ac);color:#fff;border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}

/* Query builder */
.qbuilder{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px}
.qbuilder h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--ac2)}
.qrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.qfield{display:flex;flex-direction:column;gap:4px;min-width:130px}
.qfield label{font-size:11px;color:var(--tx2)}
.qfield select,.qfield input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:7px;font-size:12px;outline:none;width:100%}
.qfield select:focus,.qfield input:focus{border-color:var(--ac)}
.runbtn{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;align-self:flex-end}
.runbtn:hover{opacity:.85}

/* Quick presets */
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.preset{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:.15s}
.preset:hover{border-color:var(--ac);color:var(--ac)}

/* Results */
.results{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.results{grid-template-columns:1fr}}
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.ph{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ph-title{font-size:13px;font-weight:600}
.ph-sub{font-size:11px;color:var(--tx2)}

/* Table */
.twrap{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--s2);padding:9px 12px;text-align:left;color:var(--tx2);font-weight:600;position:sticky;top:0;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--bd);white-space:nowrap}
tr:hover td{background:var(--s2)}
.nr{text-align:right;font-variant-numeric:tabular-nums}
.rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;background:var(--s2);color:var(--tx2)}
.rank.g1{background:#ffd700;color:#000}
.rank.g2{background:#c0c0c0;color:#000}
.rank.g3{background:#cd7f32;color:#fff}
.empty{text-align:center;color:var(--tx2);padding:40px;font-size:13px}

/* Chart */
.chart-wrap{padding:16px}
canvas{max-height:350px}

/* Column mapper */
.mapper{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px}
.mapper h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:10px}
.mrow{display:flex;gap:10px;flex-wrap:wrap}
.mfield{display:flex;flex-direction:column;gap:3px}
.mfield label{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px}
.mfield select{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 8px;border-radius:6px;font-size:11px;outline:none;min-width:120px}

.tip{background:rgba(108,138,255,.08);border:1px solid rgba(108,138,255,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.tip strong{color:var(--ac)}
</style>
</head>
<body>
<div class="hdr">
  <span>💊</span><h1>의약품 데이터 분석기</h1><span class="badge">v3</span>
  <span id="fileNameBadge" style="margin-left:auto;font-size:11px;color:var(--tx2)"></span>
</div>
<div class="wrap">

<!-- Upload -->
<div id="upSec">
  <div class="upzone" id="dz" onclick="fi.click()">
    <div style="font-size:44px">📂</div>
    <h2 style="font-size:17px;margin:10px 0 6px">엑셀 파일 업로드</h2>
    <p style="color:var(--tx2);font-size:12px">.xlsx / .xls 드래그 또는 클릭</p>
    <button class="upbtn" onclick="event.stopPropagation();fi.click()">파일 선택</button>
  </div>
  <input type="file" id="fi" accept=".xlsx,.xls">
</div>

<!-- Config -->
<div class="cfgbar" id="cfgBar" style="display:none">
  <label>시트:</label><select id="sheetSel" onchange="loadSheet()"></select>
  <label>헤더 행:</label><input type="number" id="hrowNum" value="1" min="1" max="20" style="width:55px">
  <button class="cfgbtn" onclick="loadSheet()">적용</button>
  <button onclick="resetAll()" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;margin-left:auto">다른 파일</button>
</div>

<!-- Main -->
<div id="mainSec" style="display:none">

  <!-- Column Mapper -->
  <div class="mapper" id="mapper">
    <h3>🔧 컬럼 매핑 — 아래에서 각 역할에 해당하는 컬럼을 지정하세요</h3>
    <div class="mrow">
      <div class="mfield"><label>회사명</label><select id="mCompany"></select></div>
      <div class="mfield"><label>제품명</label><select id="mProduct"></select></div>
      <div class="mfield"><label>단일/복합제</label><select id="mType"></select></div>
      <div class="mfield"><label>ETC/OTC</label><select id="mEtcOtc"></select></div>
      <div class="mfield"><label>ATC4</label><select id="mAtc"></select></div>
      <div class="mfield"><label>급여구분</label><select id="mInsurance"></select></div>
      <div class="mfield"><label>성분명</label><select id="mIngredient"></select></div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--tx2)">
      💡 연도별 매출/판매량 컬럼은 아래에서 자동 감지됩니다.
      감지된 연도 컬럼: <span id="detectedYears" style="color:var(--gr)">—</span>
    </div>
  </div>

  <!-- Query Builder -->
  <div class="qbuilder">
    <h3>🔍 분석 조건 설정</h3>
    <div class="qrow">
      <div class="qfield" style="min-width:150px">
        <label>회사명 필터</label>
        <input type="text" id="qCompany" placeholder="예: 신풍제약 (빈칸=전체)">
      </div>
      <div class="qfield">
        <label>단일/복합제</label>
        <select id="qType"><option value="">전체</option></select>
      </div>
      <div class="qfield">
        <label>ETC/OTC</label>
        <select id="qEtcOtc"><option value="">전체</option></select>
      </div>
      <div class="qfield">
        <label>ATC4 필터</label>
        <input type="text" id="qAtc" placeholder="빈칸=전체">
      </div>
      <div class="qfield">
        <label>급여구분</label>
        <select id="qInsurance"><option value="">전체</option></select>
      </div>
      <div class="qfield">
        <label>기준 연도</label>
        <select id="qYear"></select>
      </div>
      <div class="qfield">
        <label>정렬 기준</label>
        <select id="qMetric"><option value="sales">매출액</option><option value="unit">판매량(Unit)</option></select>
      </div>
      <div class="qfield">
        <label>TOP N</label>
        <select id="qTopN">
          <option value="5">TOP 5</option>
          <option value="10" selected>TOP 10</option>
          <option value="20">TOP 20</option>
          <option value="30">TOP 30</option>
          <option value="50">TOP 50</option>
        </select>
      </div>
      <button class="runbtn" onclick="runQuery()">▶ 분석 실행</button>
    </div>

    <!-- Presets -->
    <div class="presets">
      <span style="font-size:11px;color:var(--tx2);align-self:center">빠른 분석:</span>
      <span class="preset" onclick="applyPreset('shinpoong_complex')">신풍제약 복합제 TOP10</span>
      <span class="preset" onclick="applyPreset('etc_top10')">ETC 전체 TOP10</span>
      <span class="preset" onclick="applyPreset('otc_top10')">OTC 전체 TOP10</span>
      <span class="preset" onclick="applyPreset('insured_top10')">급여 TOP10</span>
      <span class="preset" onclick="applyPreset('unit_top10')">판매량 TOP10</span>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="resultsArea" style="display:none">
    <div class="panel">
      <div class="ph">
        <span class="ph-title" id="resultTitle">분석 결과</span>
        <span class="ph-sub" id="resultSub"></span>
      </div>
      <div class="twrap" id="resultTable"></div>
    </div>
    <div class="panel">
      <div class="ph">
        <span class="ph-title">📈 연도별 매출 추이</span>
        <div style="display:flex;gap:6px">
          <button onclick="setChartMode('line')" id="btnLine" style="background:var(--ac);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">꺾은선</button>
          <button onclick="setChartMode('bar')" id="btnBar" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx2);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">막대</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <!-- Extra: Total by year -->
  <div id="yearSummaryPanel" style="display:none;margin-top:14px" class="panel">
    <div class="ph"><span class="ph-title">📊 필터 조건 전체 — 연도별 합계</span></div>
    <div class="chart-wrap"><canvas id="yearSumChart"></canvas></div>
  </div>
</div>
</div>

<script>
let wb=null, allData=[], cols=[], yearSalesCols=[], yearUnitCols=[], chartInst=null, chartInst2=null, cMode='line';
let lastTopProducts=[], lastYears=[];

const fi=document.getElementById('fi');
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>loadFile(e.target.files[0]));

function loadFile(f){
  if(!f)return;
  document.getElementById('fileNameBadge').textContent='📄 '+f.name;
  const r=new FileReader();
  r.onload=e=>{
    wb=XLSX.read(e.target.result,{type:'array'});
    const ss=wb.SheetNames;
    const sel=document.getElementById('sheetSel');
    sel.innerHTML=ss.map(s=>`<option value="${s}">${s}</option>`).join('');
    document.getElementById('upSec').style.display='none';
    document.getElementById('cfgBar').style.display='flex';
    loadSheet();
  };
  r.readAsArrayBuffer(f);
}

function loadSheet(){
  const sheet=document.getElementById('sheetSel').value||wb.SheetNames[0];
  const hrow=parseInt(document.getElementById('hrowNum').value||1)-1;
  const ws=wb.Sheets[sheet];
  allData=XLSX.utils.sheet_to_json(ws,{defval:'',range:hrow});
  if(!allData.length){alert('데이터 없음 — 헤더 행 번호를 확인하세요');return;}
  cols=Object.keys(allData[0]);
  detectYearCols();
  initMapper();
  initQueryFilters();
  document.getElementById('mainSec').style.display='';
}

function detectYearCols(){
  // Detect columns that look like "2021매출", "2022_sales", "2023 unit" etc.
  yearSalesCols=[];yearUnitCols=[];
  cols.forEach(c=>{
    const cl=c.toString().toLowerCase();
    const hasYear=/20[12]\d/.test(c);
    if(!hasYear)return;
    if(/unit|판매량|수량|qty/i.test(cl)) yearUnitCols.push(c);
    else if(/매출|sales|amt|금액|amount/i.test(cl)||(/20[12]\d/.test(c)&&!/(unit|판매량|수량|qty)/i.test(cl))) yearSalesCols.push(c);
  });
  // Fallback: if nothing found, group numeric cols with years
  if(!yearSalesCols.length&&!yearUnitCols.length){
    const numCols=cols.filter(c=>allData.slice(0,10).some(r=>typeof r[c]==='number'&&r[c]>0));
    yearSalesCols=numCols.filter(c=>/20[12]\d/.test(c));
  }
  document.getElementById('detectedYears').textContent=
    '매출: ['+yearSalesCols.join(', ')+']  판매량: ['+yearUnitCols.join(', ')+']';
  // Populate year selector
  const years=[...new Set([...yearSalesCols,...yearUnitCols].map(c=>c.match(/20[12]\d/)?.[0]).filter(Boolean))].sort();
  const ySel=document.getElementById('qYear');
  ySel.innerHTML=years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  if(years.length)ySel.value=years[years.length-1];
  lastYears=years;
}

function initMapper(){
  const optAll='<option value="">— 선택 —</option>'+cols.map(c=>`<option value="${c}">${c}</option>`).join('');
  ['mCompany','mProduct','mType','mEtcOtc','mAtc','mInsurance','mIngredient'].forEach(id=>{
    document.getElementById(id).innerHTML=optAll;
  });
  // Auto-detect
  const auto={
    mCompany:['회사','company','mfr','제조','audit'],
    mProduct:['제품명','product','품명','drug'],
    mType:['단일','복합','type','제형'],
    mEtcOtc:['etc','otc'],
    mAtc:['atc'],
    mInsurance:['급여','insur','보험'],
    mIngredient:['성분','ingredient','ingred']
  };
  Object.entries(auto).forEach(([id,kws])=>{
    const match=cols.find(c=>kws.some(k=>c.toString().toLowerCase().includes(k)));
    if(match)document.getElementById(id).value=match;
  });
}

function initQueryFilters(){
  const typeCol=document.getElementById('mType').value;
  const etcCol=document.getElementById('mEtcOtc').value;
  const insCol=document.getElementById('mInsurance').value;
  const fill=(selId,col)=>{
    const sel=document.getElementById(selId);
    if(!col){sel.innerHTML='<option value="">전체</option>';return;}
    const uniq=[...new Set(allData.map(r=>r[col]).filter(v=>v!=''))].sort();
    sel.innerHTML='<option value="">전체</option>'+uniq.map(v=>`<option>${v}</option>`).join('');
  };
  fill('qType',typeCol);
  fill('qEtcOtc',etcCol);
  fill('qInsurance',insCol);
}

function getCol(id){return document.getElementById(id).value}

function applyPreset(p){
  const year=document.getElementById('qYear').value||lastYears[lastYears.length-1];
  if(p==='shinpoong_complex'){
    document.getElementById('qCompany').value='신풍';
    document.getElementById('qMetric').value='sales';
    // Try to set 복합제
    const typeCol=getCol('mType');
    if(typeCol){const opts=[...document.getElementById('qType').options].map(o=>o.value);const m=opts.find(o=>o.includes('복합'));if(m)document.getElementById('qType').value=m;}
  } else if(p==='etc_top10'){
    document.getElementById('qCompany').value='';
    const etcOpts=[...document.getElementById('qEtcOtc').options].map(o=>o.value);
    const m=etcOpts.find(o=>o.toUpperCase()==='ETC'||o.includes('전문'));
    if(m)document.getElementById('qEtcOtc').value=m;
    document.getElementById('qMetric').value='sales';
  } else if(p==='otc_top10'){
    document.getElementById('qCompany').value='';
    const otcOpts=[...document.getElementById('qEtcOtc').options].map(o=>o.value);
    const m=otcOpts.find(o=>o.toUpperCase()==='OTC'||o.includes('일반'));
    if(m)document.getElementById('qEtcOtc').value=m;
  } else if(p==='insured_top10'){
    document.getElementById('qCompany').value='';
    const iOpts=[...document.getElementById('qInsurance').options].map(o=>o.value);
    const m=iOpts.find(o=>o.includes('급여')||o==='Y');
    if(m)document.getElementById('qInsurance').value=m;
  } else if(p==='unit_top10'){
    document.getElementById('qMetric').value='unit';
  }
  runQuery();
}

function runQuery(){
  const companyQ=document.getElementById('qCompany').value.trim();
  const typeQ=document.getElementById('qType').value;
  const etcQ=document.getElementById('qEtcOtc').value;
  const atcQ=document.getElementById('qAtc').value.trim();
  const insQ=document.getElementById('qInsurance').value;
  const year=document.getElementById('qYear').value;
  const metric=document.getElementById('qMetric').value;
  const topN=parseInt(document.getElementById('qTopN').value);

  const cComp=getCol('mCompany'), cProd=getCol('mProduct'), cType=getCol('mType');
  const cEtc=getCol('mEtcOtc'), cAtc=getCol('mAtc'), cIns=getCol('mInsurance');

  // Find year cols
  const salesCol=yearSalesCols.find(c=>c.toString().includes(year))||yearSalesCols[yearSalesCols.length-1];
  const unitCol=yearUnitCols.find(c=>c.toString().includes(year))||yearUnitCols[yearUnitCols.length-1];

  // Filter
  let filtered=allData.filter(r=>{
    if(companyQ&&cComp&&!String(r[cComp]||'').includes(companyQ))return false;
    if(typeQ&&cType&&String(r[cType])!==typeQ)return false;
    if(etcQ&&cEtc&&String(r[cEtc])!==etcQ)return false;
    if(atcQ&&cAtc&&!String(r[cAtc]||'').includes(atcQ))return false;
    if(insQ&&cIns&&String(r[cIns])!==insQ)return false;
    return true;
  });

  // Sort by metric
  const sortCol=metric==='unit'?unitCol:salesCol;
  if(sortCol){filtered.sort((a,b)=>(Number(b[sortCol])||0)-(Number(a[sortCol])||0));}

  const top=filtered.slice(0,topN);

  // Render table
  const metricLabel=metric==='unit'?'판매량(Unit)':'매출액(원)';
  const dispCol=metric==='unit'?unitCol:salesCol;
  document.getElementById('resultTitle').textContent=`${year}년 기준 TOP ${topN}`;
  document.getElementById('resultSub').textContent=`총 ${filtered.length.toLocaleString()}개 중 상위 ${top.length}개`;
  document.getElementById('resultTable').innerHTML=`<table><thead><tr>
    <th>순위</th>
    ${cProd?`<th>제품명</th>`:''}
    ${cComp?`<th>회사명</th>`:''}
    ${cType?`<th>분류</th>`:''}
    ${dispCol?`<th class="nr">${metricLabel}</th>`:''}
  </tr></thead><tbody>`+top.map((r,i)=>`<tr>
    <td><span class="rank ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i+1}</span></td>
    ${cProd?`<td><strong>${r[cProd]||'—'}</strong></td>`:''}
    ${cComp?`<td style="color:var(--tx2)">${r[cComp]||'—'}</td>`:''}
    ${cType?`<td><span style="background:rgba(108,138,255,.15);color:var(--ac);padding:1px 7px;border-radius:4px;font-size:11px">${r[cType]||'—'}</span></td>`:''}
    ${dispCol?`<td class="nr"><strong>${(Number(r[dispCol])||0).toLocaleString()}</strong></td>`:''}
  </tr>`).join('')+'</tbody></table>';

  // Trend chart data
  lastTopProducts=top;
  renderTrendChart(top, cProd, metric);
  renderYearSummary(filtered, metric);
  document.getElementById('resultsArea').style.display='grid';
  document.getElementById('yearSummaryPanel').style.display='';
  document.getElementById('resultsArea').scrollIntoView({behavior:'smooth'});
}

function renderTrendChart(products, cProd, metric){
  const years=lastYears;
  const getCols=y=>metric==='unit'
    ?yearUnitCols.filter(c=>c.toString().includes(y))
    :yearSalesCols.filter(c=>c.toString().includes(y));

  const datasets=products.map((r,i)=>{
    const label=cProd?String(r[cProd]||`제품${i+1}`):`제품${i+1}`;
    const data=years.map(y=>{
      const cs=getCols(y);
      return cs.reduce((s,c)=>s+(Number(r[c])||0),0);
    });
    const hue=200+i*22;
    return{label,data,borderColor:`hsl(${hue},70%,60%)`,backgroundColor:`hsla(${hue},70%,60%,.15)`,tension:.3,fill:cMode==='line',pointRadius:4,pointHoverRadius:6};
  });

  if(chartInst)chartInst.destroy();
  const ctx=document.getElementById('trendChart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:cMode,
    data:{labels:years.map(y=>y+'년'),datasets},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:12}}},
      scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#2e3250'}},y:{ticks:{color:'#94a3b8',callback:v=>metric==='unit'?v.toLocaleString():v>=1e8?(v/1e8).toFixed(1)+'억':v.toLocaleString()},grid:{color:'#2e3250'}}}}
  });
}

function renderYearSummary(filtered, metric){
  const years=lastYears;
  const getCols=y=>metric==='unit'
    ?yearUnitCols.filter(c=>c.toString().includes(y))
    :yearSalesCols.filter(c=>c.toString().includes(y));
  const totals=years.map(y=>filtered.reduce((s,r)=>s+getCols(y).reduce((ss,c)=>ss+(Number(r[c])||0),0),0));
  if(chartInst2)chartInst2.destroy();
  const ctx2=document.getElementById('yearSumChart').getContext('2d');
  chartInst2=new Chart(ctx2,{
    type:'bar',
    data:{labels:years.map(y=>y+'년'),datasets:[{label:'연도별 합계',data:totals,backgroundColor:years.map((_,i)=>`hsl(${220+i*12},65%,55%)`),borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},
      scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#2e3250'}},y:{ticks:{color:'#94a3b8',callback:v=>metric==='unit'?v.toLocaleString():v>=1e8?(v/1e8).toFixed(0)+'억':v.toLocaleString()},grid:{color:'#2e3250'}}}}
  });
}

function setChartMode(m){
  cMode=m;
  document.getElementById('btnLine').style.background=m==='line'?'var(--ac)':'var(--s2)';
  document.getElementById('btnLine').style.color=m==='line'?'#fff':'var(--tx2)';
  document.getElementById('btnBar').style.background=m==='bar'?'var(--ac)':'var(--s2)';
  document.getElementById('btnBar').style.color=m==='bar'?'#fff':'var(--tx2)';
  if(lastTopProducts.length)renderTrendChart(lastTopProducts,getCol('mProduct'),document.getElementById('qMetric').value);
}

function resetAll(){
  wb=null;allData=[];cols=[];yearSalesCols=[];yearUnitCols=[];
  document.getElementById('upSec').style.display='';
  document.getElementById('cfgBar').style.display='none';
  document.getElementById('mainSec').style.display='none';
  document.getElementById('resultsArea').style.display='none';
  document.getElementById('yearSummaryPanel').style.display='none';
  fi.value='';
}
</script>
</body>
</html>
